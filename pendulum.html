<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aniket's Physics Lab</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .ui-panel { position: absolute; top: 20px; left: 20px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid #333; backdrop-filter: blur(10px); }
        h1 { margin: 0; font-size: 1.2rem; color: #fbbf24; text-transform: uppercase; letter-spacing: 2px; }
        .formula { margin-top: 15px; font-style: italic; color: #aaa; font-size: 0.9rem; }
        canvas { border-radius: 50%; box-shadow: 0 0 50px rgba(59, 130, 246, 0.1); }
        .credit { position: absolute; bottom: 20px; color: #444; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="ui-panel">
    <h1>The Simple Pendulum</h1>
    <div class="formula">
        Force = -mg sin(θ)<br>
        Period ≈ 2π √(L/g)
    </div>
    <p style="font-size: 0.8rem; color: #666; margin-top: 10px;">Simulation of Harmonic Motion</p>
</div>

<canvas id="canvas"></canvas>

<div class="credit">Created by Aniket • Logic & Physics Simulation</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// Set canvas size based on screen
const size = Math.min(window.innerWidth, window.innerHeight) * 0.8;
canvas.width = size;
canvas.height = size;

let angle = Math.PI / 2.7; // 60 degrees
let angleV = 0;
let angleA = 0;
let length = size * 0.5;
let gravity = 0.5; // Simulated gravity
let origin = { x: size / 2, y: 50 };
let trail = [];

function draw() {
    // Semi-transparent clear creates the "fade" effect for the trail
    ctx.fillStyle = 'rgba(10, 10, 10, 0.1)';
    ctx.fillRect(0, 0, size, size);

    // Physics Engine Logic
    // Acceleration = (Gravity / Length) * sin(Angle)
    angleA = (-1 * gravity / length) * Math.sin(angle);
    angleV += angleA;
    angleV *= 0.995; // Air resistance (Damping)
    angle += angleV;

    // Convert Polar to Cartesian coordinates
    let x = length * Math.sin(angle) + origin.x;
    let y = length * Math.cos(angle) + origin.y;

    // Draw the "Ghost" Path
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(59, 130, 246, 0.2)';
    ctx.lineWidth = 1;
    ctx.arc(origin.x, origin.y, length, 0, Math.PI * 2);
    ctx.stroke();

    // Draw String
    ctx.beginPath();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.moveTo(origin.x, origin.y);
    ctx.lineTo(x, y);
    ctx.stroke();

    // Draw Bob (The Ball)
    const gradient = ctx.createRadialGradient(x, y, 5, x, y, 20);
    gradient.addColorStop(0, '#60a5fa');
    gradient.addColorStop(1, '#1d4ed8');
    
    ctx.beginPath();
    ctx.arc(x, y, 20, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    //Draw security watermark
// Security Watermark
ctx.font = "14px 'Segoe UI'";
ctx.fillStyle = "rgba(200, 270, 244, 0.2)"; // Semi-transparent
ctx.textAlign = "right";
ctx.fillText("© 2026 Aniket | Physics Lab", canvas.width - 113, canvas.height - 50);


    // Draw the Pivot Point
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(origin.x, origin.y, 4, 0, Math.PI * 2);
    ctx.fill();

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
